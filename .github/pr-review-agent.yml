mode: comment
branches:
  include:
    - main
    - dev
review:
  lenses:
    - correctness
    - security
    - tests
    - maintainability
  browser:
    enabled: false
    paths: []
  inline_comments: high_confidence_only
  summary_comment: true
  check_run: true
  auto_rerun_on_push: true
risk:
  critical_paths:
    - auth/**
    - payments/**
    - billing/**
    - infra/**
    - migrations/**
  high_risk_labels:
    - security
    - migration
    - payments
owners:
  use_codeowners: true
publishing:
  separate_blockers_from_nits: true
  max_inline_comments: 12
  request_human_review_on:
    - blocker
    - high_security
runtime:
  session_key: "{owner}/{repo}#{pr}@{headSha}"
  subagents:
    explorer: true
    correctness: true
    security: true
    tests: true
    browser: false
